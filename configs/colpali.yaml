# ColPali retrieval + LoRA fine-tune config
checkpoint: "vidore/colpali-v1.3"
torch_dtype: "bfloat16"
device_map: "auto"

index:
  out_dir: "data/indices/colpali"
  batch_size: 2                     # safer on T4; raise on A100
  image_max_side: 448

search:
  top_k: 5
  rescore: true                     # late-interaction MaxSim

lora:
  r: 32
  alpha: 32
  dropout: 0.1
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  bias: "none"
  task_type: "FEATURE_EXTRACTION"
  output_dir: "models/colpali-cxr-lora"

train:
  epochs: 3
  per_device_batch_size: 4
  grad_accumulation: 4
  learning_rate: 5.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  scheduler: "cosine"
  hard_negatives_per_positive: 3
  eval_steps: 250
  save_steps: 250
  logging_steps: 25
  bf16: true
  gradient_checkpointing: true
  metric_for_best: "recall_at_5"
  greater_is_better: true
